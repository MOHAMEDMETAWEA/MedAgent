# Phase 14: K8s Infrastructure (deployment.yaml)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medagent-hospital-intelligence
  namespace: healthcare-ai
  labels:
    app: medagent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: medagent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: medagent
    spec:
      containers:
      - name: medagent-core
        image: medagent:5.3.0-prod
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "1000m"
            memory: "4Gi"
            nvidia.com/gpu: 1
          limits:
            cpu: "2000m"
            memory: "8Gi"
            nvidia.com/gpu: 1
        envFrom:
        - secretRef:
            name: medagent-clinical-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: medagent-service
spec:
  selector:
    app: medagent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medagent-hpa
spec:
  scaleTargetRef:
    apiVersions: apps/v1
    kind: Deployment
    name: medagent-hospital-intelligence
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
