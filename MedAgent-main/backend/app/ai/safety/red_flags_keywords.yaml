rule_patterns:
  - keywords: ["fever", "stiff neck"]
    level: emergency
    reason: "Possible meningitis"
  - keywords: ["fever", "confusion"]
    level: emergency
    reason: "Possible sepsis"
  - keywords: ["chest pain", "shortness of breath"]
    level: emergency
    reason: "Possible cardiac event or PE"
  - keywords: ["abdominal pain", "vomiting blood"]
    level: emergency
    reason: "Possible GI bleed"
  - keywords: ["ألم في الصدر", "ضيق تنفس"]
    level: emergency
    reason: "نوبة قلبية محتملة"
  - keywords: ["ألم في صدري", "ضيق تنفس"]
    level: emergency
    reason: "نوبة قلبية محتملة"
  - keywords: ["صداع", "تشنجات"]
    level: emergency
    reason: "التهاب سحايا أو ورم"
  - keywords: ["حرارة", "تشوش"]
    level: emergency
    reason: "تسمم محتمل"
