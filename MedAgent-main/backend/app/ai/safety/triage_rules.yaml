# Manchester Triage Scale — simplified decision rules
# Each rule has: condition keywords, triage level, score range, reasoning

rules:
  # ── Emergency (score 80-100) ──
  # English
  - keywords: ["chest pain", "radiating"]
    level: emergency
    score: 90
    reason: "Radiating chest pain may indicate acute coronary syndrome — requires immediate ECG and cardiac workup"

  - keywords: ["chest pain", "shortness of breath"]
    level: emergency
    score: 88
    reason: "Chest pain with dyspnea raises concern for PE or MI — same-day ED evaluation"

  - keywords: ["stroke", "weakness", "one side"]
    level: emergency
    score: 95
    reason: "Unilateral weakness is a FAST stroke sign — immediate neuroimaging warranted"

  - keywords: ["seizure", "convulsion"]
    level: emergency
    score: 92
    reason: "Active seizure or post-ictal state requires emergency evaluation"

  - keywords: ["overdose"]
    level: emergency
    score: 95
    reason: "Suspected overdose — requires immediate toxicology assessment"

  - keywords: ["bleeding", "severe"]
    level: emergency
    score: 90
    reason: "Uncontrolled hemorrhage is immediately life-threatening"

  - keywords: ["consciousness", "passed out"]
    level: emergency
    score: 90
    reason: "Loss of consciousness may indicate CNS, cardiac, or metabolic emergency"

  - keywords: ["suicidal"]
    level: emergency
    score: 95
    reason: "Suicidal ideation requires immediate psychiatric evaluation"

  # Arabic Emergency
  - keywords: ["ألم", "صدر", "يمتد"]
    level: emergency
    score: 90
    reason: "ألم الصدر الممتد للذراع أو الفك قد يشير إلى نوبة قلبية"

  - keywords: ["ألم", "صدر", "ضيق", "تنفس"]
    level: emergency
    score: 88
    reason: "ألم الصدر مع ضيق التنفس يستدعي تقييم طارئ للرئة والقلب"

  - keywords: ["ضعف", "جهة", "واحدة"]
    level: emergency
    score: 95
    reason: "ضعف في جهة واحدة من علامات الجلطة الدماغية — طوارئ فورية"

  - keywords: ["تشنج"]
    level: emergency
    score: 92
    reason: "التشنجات تستدعي تقييم طارئ"

  - keywords: ["فقد", "وعي"]
    level: emergency
    score: 90
    reason: "فقدان الوعي قد يشير لمشكلة عصبية أو قلبية"

  - keywords: ["انتحار"]
    level: emergency
    score: 95
    reason: "التفكير في الانتحار يتطلب تدخلاً نفسياً فورياً"

  - keywords: ["نزيف", "شديد"]
    level: emergency
    score: 90
    reason: "النزيف الشديد مهدد للحياة"

  # English
  - keywords: ["fever", "39"]
    level: urgent
    score: 70
    reason: "High fever in adults warrants same-day evaluation"

  - keywords: ["abdominal pain", "severe"]
    level: urgent
    score: 72
    reason: "Severe abdominal pain may indicate surgical abdomen"

  - keywords: ["headache", "severe"]
    level: urgent
    score: 65
    reason: "Severe headache warrants same-day evaluation"

  - keywords: ["blood", "stool"]
    level: urgent
    score: 68
    reason: "GI bleeding requires evaluation"

  - keywords: ["blood", "cough"]
    level: urgent
    score: 72
    reason: "Hemoptysis may indicate serious pulmonary condition"

  # Arabic Urgent
  - keywords: ["حرارة", "عالية"]
    level: urgent
    score: 70
    reason: "الحرارة العالية تستدعي تقييماً طبياً في نفس اليوم"

  - keywords: ["ألم", "بطن", "شديد"]
    level: urgent
    score: 72
    reason: "ألم البطن الشديد قد يشير لمشكلة جراحية"

  - keywords: ["صداع", "شديد"]
    level: urgent
    score: 65
    reason: "الصداع الشديد يستدعي تقييماً طبياً"

  - keywords: ["دم", "براز"]
    level: urgent
    score: 68
    reason: "وجود دم في البراز يستدعي تقييماً"

  # ── Routine (score 0-49) ──
  # English
  # English
  - keywords: ["fever", "39"]
    level: urgent
    score: 70
    reason: "High fever in adults warrants same-day evaluation to rule out serious infection"

  - keywords: ["fever", "three days"]
    level: urgent
    score: 65
    reason: "Persistent fever > 3 days may indicate bacterial infection requiring antibiotics"

  - keywords: ["abdominal pain", "severe"]
    level: urgent
    score: 72
    reason: "Severe abdominal pain may indicate surgical abdomen (appendicitis, cholecystitis, etc.)"

  - keywords: ["abdominal pain", "vomiting"]
    level: urgent
    score: 68
    reason: "Abdominal pain with vomiting raises concern for obstruction or pancreatitis"

  - keywords: ["headache", "severe", "sudden"]
    level: urgent
    score: 75
    reason: "Sudden severe headache (thunderclap) may indicate subarachnoid hemorrhage"

  - keywords: ["headache", "fever", "stiff neck"]
    level: urgent
    score: 78
    reason: "Headache with fever and neck stiffness — rule out meningitis"

  - keywords: ["blood", "stool"]
    level: urgent
    score: 68
    reason: "GI bleeding requires evaluation for source and hemodynamic stability"

  - keywords: ["blood", "cough"]
    level: urgent
    score: 72
    reason: "Hemoptysis may indicate TB, PE, malignancy, or bronchiectasis"

  - keywords: ["blood", "vomit"]
    level: urgent
    score: 75
    reason: "Hematemesis requires urgent endoscopy to identify bleeding source"

  - keywords: ["dehydration"]
    level: urgent
    score: 65
    reason: "Dehydration may require IV fluid replacement and electrolyte monitoring"

  - keywords: ["vision", "sudden"]
    level: urgent
    score: 68
    reason: "Acute vision changes may indicate retinal detachment, TIA, or optic neuritis"

  - keywords: ["dizziness", "severe"]
    level: urgent
    score: 60
    reason: "Severe dizziness with possible vertigo or cardiovascular origin"

  - keywords: ["rapid heart"]
    level: urgent
    score: 62
    reason: "Tachycardia may indicate arrhythmia, dehydration, infection, or anxiety"

  - keywords: ["urine", "burning", "pain"]
    level: urgent
    score: 55
    reason: "Dysuria suggests UTI — treat within 24 hours to prevent pyelonephritis"

  # ── Routine (score 0-49) ──
  - keywords: ["cough", "sore throat"]
    level: routine
    score: 25
    reason: "Upper respiratory symptoms without red flags — supportive care, monitor"

  - keywords: ["headache", "mild"]
    level: routine
    score: 20
    reason: "Mild tension-type headache — analgesics, hydration, rest"

  - keywords: ["back pain", "mild"]
    level: routine
    score: 20
    reason: "Mild musculoskeletal back pain — NSAIDs, physiotherapy if persistent"

  - keywords: ["rash", "itchy"]
    level: routine
    score: 15
    reason: "Mild pruritic rash without systemic symptoms — topical treatment, monitor"

  - keywords: ["diarrhea", "mild"]
    level: routine
    score: 18
    reason: "Mild acute diarrhea — oral rehydration, BRAT diet, monitor"

  - keywords: ["constipation"]
    level: routine
    score: 15
    reason: "Constipation — fiber, fluids, laxatives if needed"

  - keywords: ["insomnia"]
    level: routine
    score: 12
    reason: "Sleep difficulty — sleep hygiene, CBT-I, avoid stimulants"

  - keywords: ["fatigue", "mild"]
    level: routine
    score: 15
    reason: "Mild fatigue — evaluate lifestyle, sleep, nutrition; monitor"

  - keywords: ["allergy", "seasonal", "sneezing"]
    level: routine
    score: 12
    reason: "Seasonal allergies — antihistamines, nasal steroids as needed"

  - keywords: ["joint pain", "mild"]
    level: routine
    score: 18
    reason: "Mild arthralgia — NSAIDs, rest, physiotherapy, follow-up if persistent"

# age_adjustments: تعديل الـ score على حسب العمر
age_adjustments:
  - range: "0-1"
    adjustment: +15
    reason: "Infants require more conservative triage — lower threshold for evaluation"
  - range: "65-120"
    adjustment: +10
    reason: "Elderly patients have higher risk of serious pathology with atypical presentation"

# comorbidity_adjustments: تعديل الـ score على حسب الأمراض المزمنة
comorbidity_adjustments:
  - condition: "diabetes"
    adjustment: +5
    reason: "Diabetes increases infection risk and impairs healing"
  - condition: "heart disease"
    adjustment: +10
    reason: "Cardiac patients have higher baseline risk for any new symptom"
  - condition: "copd"
    adjustment: +8
    reason: "Respiratory infections are more dangerous in COPD patients"
  - condition: "immunocompromised"
    adjustment: +12
    reason: "Immunocompromised patients may present atypically and deteriorate faster"
  - condition: "chronic kidney disease"
    adjustment: +8
    reason: "CKD affects drug metabolism and fluid balance — lower threshold for evaluation"
