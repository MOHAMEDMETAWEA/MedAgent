services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: medagent
      POSTGRES_PASSWORD: medagent
      POSTGRES_DB: medagent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medagent"]
      interval: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://medagent:medagent@postgres:5432/medagent
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      ENV: local
      SECRET_KEY: dev-secret-key-change-in-production
      CORS_ORIGINS: '["http://localhost:3000"]'
      LLM_PROVIDER: openai_compat
      PHI_ENCRYPTION_ENABLED: "false"
      DATA_ENCRYPTION_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/backend/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend/app:/app/frontend/app
      - ./frontend/components:/app/frontend/components
      - ./frontend/lib:/app/frontend/lib
      - ./frontend/store:/app/frontend/store
      - ./frontend/messages:/app/frontend/messages
      - ./frontend/src:/app/frontend/src
      - ./frontend/test:/app/frontend/test
      - ./frontend/vitest.config.ts:/app/frontend/vitest.config.ts

volumes:
  pgdata:
