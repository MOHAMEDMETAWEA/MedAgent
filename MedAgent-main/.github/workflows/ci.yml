name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: medagent
          POSTGRES_PASSWORD: medagent
          POSTGRES_DB: medagent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://medagent:medagent@localhost:5432/medagent
      SECRET_KEY: ci-test-key
      SMTP_HOST: ""
      ENV: ci
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync
        working-directory: backend

      - name: Lint (ruff)
        run: uv run ruff check .
        working-directory: backend

      - name: Security audit (Python)
        run: uv run pip-audit
        working-directory: backend

      - name: Type check (mypy)
        run: uv run mypy app --ignore-missing-imports
        working-directory: backend

      - name: Run migrations
        run: uv run alembic upgrade head
        working-directory: backend

      - name: Run API tests
        run: uv run python -m pytest tests/auth/ tests/ -v --tb=short --timeout=30
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter=frontend

      - name: Lint
        run: pnpm --filter=frontend lint

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: pnpm --filter=frontend build

      - name: Unit tests (Vitest)
        run: pnpm --filter=frontend test --run
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter=frontend

      - name: Install Playwright browsers
        run: pnpm --filter=frontend exec playwright install --with-deps chromium

      - name: Build app
        run: pnpm --filter=frontend build

      - name: Run E2E tests
        run: pnpm --filter=frontend exec playwright test
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
